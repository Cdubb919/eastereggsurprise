<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easter Egg Surprise</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #6a0dad;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .container { text-align: center; }

    .eggs {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 20px;
    }

    .egg {
      width: 100px;
      height: 140px;
      border-radius: 50% 50% 45% 45%;
      cursor: pointer;
      animation: bounce 2s infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .egg:active { transform: scale(0.95); }

    .disabled { pointer-events: none; opacity: 0.5; }

    .pink { background: pink; }
    .blue { background: lightblue; }
    .yellow { background: yellow; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: black;
      padding: 25px 30px;
      border-radius: 12px;
      display: none;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 300px;
    }

    .popup a, .popup button {
      margin-top: 15px;
      padding: 10px 18px;
      border: none;
      background: #6a0dad;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .note {
      font-size: 12px;
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="container">
    <h1>🐣 Easter Egg Surprise 🐣</h1>
    <p>Pick ONE egg to reveal your exclusive discount!</p>

    <div class="eggs">
      <div class="egg pink" onclick="handleClick(0)"></div>
      <div class="egg blue" onclick="handleClick(1)"></div>
      <div class="egg yellow" onclick="handleClick(2)"></div>
    </div>
  </div>

  <div class="popup" id="popup">
    <h2 id="discountText"></h2>
    <a href="https://book.squareup.com/appointments/bc52e454-dae1-4f17-9202-978a3354bf21/location/V38TF6VCY7BP3/services?buttonTextColor=ffffff&color=000000&locale=en&referrer=so" target="_blank">
      Book Your Appointment ✨
    </a>
    <div class="note">Screenshot your discount to redeem 💕</div>
    <button onclick="closePopup()">Close</button>
  </div>

  <script>
    const discounts = [
      "10% OFF Lash Cleanser 💙",
      "5% OFF Any Service 💛",
      "10% OFF Full Set of Lash Extensions 💖"
    ];

    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    const shuffled = shuffle([...discounts]);

    function handleClick(index) {
      if (localStorage.getItem("eggPlayed")) {
        alert("You've already picked your egg! 🐣");
        return;
      }

      document.getElementById("discountText").innerText = shuffled[index];
      document.getElementById("popup").style.display = "block";

      localStorage.setItem("eggPlayed", "true");

      document.querySelectorAll(".egg").forEach(e => e.classList.add("disabled"));

      launchConfetti();
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    window.onload = () => {
      if (localStorage.getItem("eggPlayed")) {
        document.querySelectorAll(".egg").forEach(e => e.classList.add("disabled"));
      }
    };

    // 🎉 SIMPLE CONFETTI
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let pieces = [];

    function launchConfetti() {
      pieces = [];
      for (let i = 0; i < 100; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          size: Math.random() * 8 + 4,
          speedY: Math.random() * 3 + 2,
          speedX: Math.random() * 2 - 1,
          color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
      }
      animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        p.y += p.speedY;
        p.x += p.speedX;
      });
      requestAnimationFrame(animateConfetti);
    }
  </script>
</body>
</html>
